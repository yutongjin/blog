baseURL = "https://yutongjin.com/"
languageCode = "en-us"
title = "Yutong Jin"
description = "Engineering notes on systems, scaling, and ML infra."
theme = "PaperMod"

[params]
  # --- Home/Profile ---
  [params.profileMode]
    enabled = true
    title = "Yutong Jin"
    subtitle = "Software Engineer • Backend / ML Infra • Notes on systems, scaling, and engineering"
    imageUrl = "/avatar.png"  # 放到 static/avatar.jpg
    imageTitle = "Yutong Jin"
    imageWidth = 140
    imageHeight = 140

    [[params.profileMode.buttons]]
      name = "Posts"
      url = "/posts/"

    [[params.profileMode.buttons]]
      name = "Projects"
      url = "/projects/"

  # --- Reading experience ---
  ShowToc = true
  TocOpen = true
  ShowBreadCrumbs = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true

  # --- Code ---
  ShowCodeCopyButtons = true

  # --- Search (PaperMod) ---
  enableSearch = true

  # --- Social icons ---
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/yutongjin"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/yutong-jin/"

  [[params.socialIcons]]
    name = "bilibili"
    url = "https://space.bilibili.com/336708395"

  [[params.socialIcons]]
    name = "youtube"
    url = "https://www.youtube.com/@yutongjin6521"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:YOUR_EMAIL@example.com"

  [params.editPost]
    URL = "https://github.com/yutongjin/blog/edit/main/content"
    Text = "Edit on GitHub"
    appendFilePath = true

  [params.admin]
    publishEndpoint = "https://macbook-air.tail5b147d.ts.net"
    username = "yutong"
